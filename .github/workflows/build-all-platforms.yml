name: Build all platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true
      - name: Restore release signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret set; release build will fall back to the debug key (updates won't overwrite-install)."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          : > android/key.properties
          echo "storePassword=$STORE_PASSWORD" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Generate Windows Flutter config
        shell: pwsh
        run: |
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Flutter 3.24 can fail here by selecting an unavailable Visual Studio generator. Continuing after generating Flutter config."
            $global:LASTEXITCODE = 0
          }
          if (-not (Test-Path "windows/flutter/ephemeral/generated_config.cmake")) {
            throw "Flutter did not generate windows/flutter/ephemeral/generated_config.cmake."
          }
          if (Test-Path "build/windows/x64") {
            Remove-Item "build/windows/x64" -Recurse -Force
          }
      - name: Build Windows app with installed Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $version = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationVersion
          if (-not $version) {
            throw "Visual Studio was not found on this runner."
          }

          if ($version.StartsWith("18.")) {
            $generator = "Visual Studio 18 2026"
          } elseif ($version.StartsWith("17.")) {
            $generator = "Visual Studio 17 2022"
          } else {
            throw "Unsupported Visual Studio version: $version"
          }

          cmake -S windows -B build/windows/x64 -G "$generator" -A x64 -DFLUTTER_TARGET_PLATFORM=windows-x64
          cmake --build build/windows/x64 --config Release --target INSTALL
      - name: Package Windows app
        shell: pwsh
        run: |
          Copy-Item windows/README-Windows.md build/windows/x64/runner/Release/README-Windows.md -Force
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value.Split('+')[0]
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\installer\setup.iss" "/DMyAppVersion=$version"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed with exit code $LASTEXITCODE" }
          Copy-Item "windows\installer\Output\AI-Image-Generator-Setup.exe" "AI-Image-Generator-Setup.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: AI-Image-Generator-Setup.exe
          if-no-files-found: error

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package macOS app
        run: ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/AI Image Generator.app" AI-Image-Generator-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: AI-Image-Generator-macos.zip
          if-no-files-found: error

  ios:
    name: iOS app unsigned
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned iOS app
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app AI-Image-Generator-ios-unsigned.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release-unsigned
          path: AI-Image-Generator-ios-unsigned.zip
          if-no-files-found: error
